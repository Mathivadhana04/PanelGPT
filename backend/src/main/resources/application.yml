server:
  port: 8080

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/panelgpt?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=UTF-8}
    username: ${SPRING_DATASOURCE_USERNAME:${DB_USER:root}}
    password: ${SPRING_DATASOURCE_PASSWORD:${DB_PASS:}}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 2
      minimum-idle: 1
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      connection-test-query: SELECT 1
      keepalive-time: 60000
      # Don't fail startup if DB is unreachable — log the error instead
      initialization-fail-timeout: -1
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: UTC

ollama:
  base-url: ${OLLAMA_URL:http://localhost:11434}
  model: ${OLLAMA_MODEL:llama3}
  timeout: 120

groq:
  api-key: ${GROQ_API_KEY:}

jwt:
  secret: ${JWT_SECRET:panelgpt-super-secret-key-change-this-in-production-min-256-bits-abc123}
  access-expiry: 900000
  refresh-expiry: 604800000

cors:
  allowed-origins: ${CORS_ORIGIN:http://localhost:5173}

logging:
  level:
    com.panelgpt: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
    # Show HikariCP and MySQL connection errors clearly
    com.zaxxer.hikari: DEBUG
    com.zaxxer.hikari.pool: DEBUG
    com.mysql.cj: WARN
